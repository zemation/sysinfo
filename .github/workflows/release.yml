name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ github.ref_name }}
          if [ "$TAG" = "main" ]; then TAG=${{ github.event.inputs.tag }}; fi
          gh release create $TAG \
            --repo ${{ github.repository }} \
            --title "sysinfo $TAG" \
            --draft=false \
            --latest \
            --notes "## Downloads

          | Binary | OS | Architecture |
          |---|---|---|
          | sysinfo-linux-amd64 | Linux | x86_64 (64-bit) |
          | sysinfo-linux-arm64 | Linux | ARM64 (Raspberry Pi, etc) |

          ## Install
          \`\`\`bash
          chmod +x sysinfo-linux-amd64
          sudo mv sysinfo-linux-amd64 /usr/local/bin/sysinfo
          \`\`\`"

  build:
    name: Build and Upload
    runs-on: ubuntu-latest
    needs: create-release
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            binary: sysinfo-linux-amd64
          - goos: linux
            goarch: arm64
            binary: sysinfo-linux-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -o ${{ matrix.binary }} main.go

      - name: Upload binary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ github.ref_name }}
          if [ "$TAG" = "main" ]; then TAG=${{ github.event.inputs.tag }}; fi
          gh release upload $TAG \
            --repo ${{ github.repository }} \
            ${{ matrix.binary }} --clobber