name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            binary: sysinfo-linux-amd64
          - goos: linux
            goarch: arm64
            binary: sysinfo-linux-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -o ${{ matrix.binary }} main.go

      - name: Create release and upload binary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "sysinfo ${{ github.ref_name }}" \
            --latest \
            --notes "## Downloads

          | Binary | OS | Architecture |
          |---|---|---|
          | sysinfo-linux-amd64 | Linux | x86_64 (64-bit) |
          | sysinfo-linux-arm64 | Linux | ARM64 (Raspberry Pi, etc) |

          ## Install
          \`\`\`bash
          chmod +x sysinfo-linux-amd64
          sudo mv sysinfo-linux-amd64 /usr/local/bin/sysinfo
          \`\`\`" || true
          gh release upload ${{ github.ref_name }} ${{ matrix.binary }} --clobber